services:
  webapp:
    image: evgtsvdotme
    build:
      context: .
      dockerfile: src/EvgTsvDotMe/Dockerfile
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
        - /tmp:rw,noexec,nosuid,size=64M
    security_opt:
      - "no-new-privileges=true"
    healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/ping" ]
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 40s
    env_file:
        - .env
